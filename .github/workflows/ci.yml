name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Job 1 : Lint des fichiers YAML et du Dockerfile
  # -------------------------------------------------------
  lint:
    name: Lint YAML & Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de yamllint
        run: pip install yamllint

      - name: Lint des fichiers YAML
        run: yamllint -c .yamllint.yml k8s/

      - name: Lint du Dockerfile avec Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # -------------------------------------------------------
  # Job 2 : Build de l'image Docker
  # -------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t flask-api:${{ github.sha }} .

      - name: Sauvegarder l'image Docker
        run: docker save flask-api:${{ github.sha }} -o /tmp/flask-api.tar

      - name: Upload de l'image comme artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/flask-api.tar
          retention-days: 1

  # -------------------------------------------------------
  # Job 3 : Scan de securite avec Trivy
  # -------------------------------------------------------
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Download de l'image Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Charger l'image Docker
        run: docker load -i /tmp/flask-api.tar

      # Scan des dependances (filesystem)
      - name: Trivy - Scan des dependances (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH,MEDIUM

      # Scan de l'image Docker
      - name: Trivy - Scan de l'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH,MEDIUM

  # -------------------------------------------------------
  # Job 4 : Politique de securite avec Conftest
  # -------------------------------------------------------
  policy-check:
    name: Conftest Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Conftest
        run: |
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz"
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Verification de la politique no-root
        run: conftest test k8s/deployment.yaml -p policy/ --all-namespaces
